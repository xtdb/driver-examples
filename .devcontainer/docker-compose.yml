services:
  # Init container to set proper permissions for volumes
  init-volumes:
    image: busybox
    container_name: init-volumes
    volumes:
      - xtdb-data:/var/lib/xtdb
      - ./init-volumes.sh:/init-volumes.sh:ro
    command: sh /init-volumes.sh
    user: root

  app:
    image: driver-examples-app:latest
    pull_policy: never
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.dev
    container_name: app

    security_opt:
      - apparmor=unconfined
    privileged: true

    volumes:
      - ..:/workspaces/driver-examples:cached
      - xtdb-data:/var/lib/xtdb:ro

    # Overrides default command so things don't shut down after the process ends.
    command: sh -c "sudo mkdir -p /workspaces/driver-examples/logs && sudo ln -sfn /var/lib/xtdb/logs/xtdb.log /workspaces/driver-examples/logs/xtdb.log && sleep infinity"

    depends_on:
      init-volumes:
        condition: service_completed_successfully
      xtdb:
        condition: service_started
      tansu:
        condition: service_healthy

  garage:
    image: dxflrs/garage:v2.1.0
    container_name: garage
    restart: unless-stopped
    volumes:
      - garage-data:/var/lib/garage/data
      - garage-meta:/var/lib/garage/meta
      - ./garage.toml:/etc/garage.toml
    environment:
      GARAGE_CONFIG_FILE: /etc/garage.toml
    ports:
      - "3900:3900"  # RPC
      - "3901:3901"  # Admin API
      - "3902:3902"  # S3 API

  init-garage:
    image: alpine:latest
    container_name: init-garage
    volumes:
      - ./init-garage-alpine.sh:/init-garage.sh:ro
      - ./garage.toml:/config/garage.toml:ro
      - garage-data:/var/lib/garage/data:ro
      - garage-meta:/var/lib/garage/meta:ro
    network_mode: "service:garage"
    depends_on:
      garage:
        condition: service_started
    entrypoint: ["/bin/sh", "/init-garage.sh"]

  tansu:
    image: ghcr.io/tansu-io/tansu:0.6.0
    container_name: tansu
    restart: unless-stopped
    command:
      - --cluster-id
      - RvQwrYegSUCkIPkaiAZQlQ
      - --listener-url
      - tcp://0.0.0.0:9092/
      - --advertised-listener-url
      - tcp://tansu:9092/
      - --storage-engine
      - sqlite:///data/tansu.db
    volumes:
      - tansu-data:/data
    ports:
      - "19092:9092"
    healthcheck:
      test: ["CMD", "/tansu", "topic", "list"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  xtdb:
    image: ghcr.io/xtdb/xtdb-aws:edge
## helpful config for custom (local) image builds...
#    image: xtdb-aws-local
#    pull_policy: never # only when using the local image
## do `.gradlew clean` then `./gradlew :docker:aws:shadowJar`
## then `docker build -f docker/aws/Dockerfile -t xtdb-aws-local docker/aws/`
    container_name: xtdb
    restart: unless-stopped
    user: "20000:20000"
    environment:
      JDK_JAVA_OPTIONS: "-Xmx1000m -Xms1000m -XX:MaxDirectMemorySize=2000m -XX:MaxMetaspaceSize=256m -Dlogback.configurationFile=/config/logback.xml"
      AWS_ACCESS_KEY_ID: "GK31c2f218bd3e1932929759c1"
      AWS_SECRET_ACCESS_KEY: "b8e1ec4d832d1038fb34242fc0f8e4f1ee8e0ce00fc1be1f12e28550b060c2d5"
      AWS_REGION: "garage"
      AWS_ENDPOINT: "http://garage:3902"
    volumes:
      - xtdb-data:/var/lib/xtdb
      - ./xtdb.yaml:/config/xtdb.yaml
      - ./logback.xml:/config/logback.xml
    command: ["-f", "/config/xtdb.yaml"]
    depends_on:
      init-volumes:
        condition: service_completed_successfully
      init-garage:
        condition: service_completed_successfully
      tansu:
        condition: service_healthy
    ports:
      - "5432:5432"  # Expose XTDB on the host
      - "8080:8080"  # Healthz/maintenance API
      - "9833:9833"  # Flight SQL
    mem_limit: 5000m
    memswap_limit: 5000m

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
    ports:
      - "3000:3000"
    depends_on:
      xtdb:
        condition: service_started

  garage-webui:
    image: khairul169/garage-webui:latest
    container_name: garage-webui
    restart: unless-stopped
    environment:
      API_BASE_URL: "http://garage:3901"
      S3_ENDPOINT_URL: "http://garage:3902"
      API_ADMIN_KEY: "changeme1234"
    ports:
      - "3909:3909"
    depends_on:
      init-garage:
        condition: service_completed_successfully

volumes:
  xtdb-data:
  garage-data:
  garage-meta:
  tansu-data:
  metabase-data:
